<!DOCTYPE html>
<html>
<head>
    <title>CRM Augusto</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="sidebar">

        <h2>🚀 CRM Augusto</h2>

        <p style="color: #cbd5e1;">
    👤 {{ usuario }}
</p>

        <a href="/">📊 Dashboard</a>

        <a href="/clientes">👥 Clientes</a>

        <a href="/cadastro">➕ Novo Cliente</a>

        <a href="/logout">🚪 Sair</a>

    </div>

    <div class="content">

    <h1>📊 Dashboard</h1>

    <div class="card">

        <h3>Total de Clientes</h3>

        <p>{{ total_clientes }}</p>

    </div>

    <br><br>

    <div class="cliente">

        <h2>🕒 Últimos Clientes</h2>

        {% for cliente in ultimos_clientes %}

            <p>👤 {{ cliente[0] }}</p>

        {% endfor %}

    </div>

</div>

</body>
</html>
