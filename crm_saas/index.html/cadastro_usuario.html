<!DOCTYPE html>
<html>
<head>
    <title>Criar Conta</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h1>📝 Criar Conta</h1>

        <form action="/cadastrar_usuario" method="POST">

            <input
                type="text"
                name="usuario"
                placeholder="Usuário"
                required
            >

            <br><br>

            <input
                type="password"
                name="senha"
                placeholder="Senha"
                required
            >

            <br><br>

            <button type="submit">
                Criar Conta
            </button>

        </form>

    </div>

</div>

</body>
</html>
